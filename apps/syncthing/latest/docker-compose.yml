services:
  syncthing:
    container_name: ${CONTAINER_NAME}
    image: linuxserver/syncthing:latest
    restart: always
    hostname: ${CONTAINER_HOSTNAME}
    environment:
      - PUID=${CONTAINER_UID}
      - PGID=${CONTAINER_GID}
      - TZ=${TIME_ZONE}
      - HOME=/data
    volumes:
      - ${DATA_PATH_APP_CONFIG}:/config
      - ${DATA_PATH_DATA}:/data
    network_mode: host
    labels:
      createdBy: "Apps"
